<!DOCTYPE html>
<html>
<head>
  <title>Entra External ID Demo</title>
  <script src="https://alcdn.msauth.net/browser/2.39.0/js/msal-browser.min.js"></script>
</head>
<body>
  <h2>Entra External ID – NCSC PoC</h2>

  <button onclick="signIn()">Sign In</button>
  <button onclick="signOut()">Sign Out</button>

  <pre id="output"></pre>

  <script>
  // Wait until MSAL is actually available
  if (!window.msal) {
    console.error("MSAL failed to load");
  }

  const msalConfig = {
    auth: {
      clientId: "3c7311d8-57cd-4488-90fb-a7f732f6db86",
      authority: "https://DOJEEIDNCSCDEV.ciamlogin.com/29a87ad4-6240-4f00-becc-8d2a3f0fde46",
      redirectUri: window.location.href
    }
  };

  const msalInstance = new msal.PublicClientApplication(msalConfig);

  function signIn() {
    msalInstance.loginPopup({
      scopes: ["openid", "profile"]
    }).then(response => {
      document.getElementById("output").textContent =
        JSON.stringify(response.account, null, 2);
    }).catch(error => console.error(error));
  }

  function signOut() {
    msalInstance.logoutPopup();
    document.getElementById("output").textContent = "";
  }
</script>
</body>
</html>
